<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="shortcut icon" href="/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;0,500;1,300;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
    <title>XMA, explained – Edith Mina Lyre</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .video-frame {
            margin: 0 auto;
            max-width: 100%;
            position: relative;
        }
        .video-frame video {
            display: block;
            width: 100%;
            height: auto;
            border-radius: 2px;
            background: var(--bg-primary);
            box-shadow:
                0 0 0 1px var(--border-light),
                0 30px 80px -20px rgba(0, 0, 0, 0.45),
                0 0 60px -10px var(--glow-color);
        }
        .video-frame::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 3px;
            pointer-events: none;
            background: radial-gradient(ellipse at center, var(--glow-color) 0%, transparent 70%);
            opacity: 0.4;
            z-index: -1;
            filter: blur(20px);
        }
        .video-caption {
            text-align: center;
            font-family: var(--font-display);
            font-style: italic;
            font-size: 0.92rem;
            color: var(--gold);
            margin-top: 1.6em;
            letter-spacing: 0.04em;
            opacity: 0.85;
        }
    </style>
</head>
<body>
    <div class="grain"></div>
    <div class="cursor-glow" id="glow"></div>

    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <svg class="sun" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="12" r="5"/>
            <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
        <svg class="moon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
    </button>

    <main>
        <a href="/" class="back">home</a>

        <header class="work-header">
            <h1>XMA, explained</h1>
        </header>

        <div class="work-body">
            <div class="video-frame">
                <video controls preload="metadata" playsinline>
                    <source src="xma-explained.mp4" type="video/mp4">
                    Your browser doesn't seem to support embedded video. You can
                    <a href="xma-explained.mp4">download the file</a> instead.
                </video>
            </div>
        </div>

        <div class="mark"></div>
    </main>

    <script>
        const toggle = document.getElementById('themeToggle');
        const html = document.documentElement;
        const savedTheme = localStorage.getItem('theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (savedTheme) { html.setAttribute('data-theme', savedTheme); }
        else if (!prefersDark) { html.setAttribute('data-theme', 'day'); }
        toggle.addEventListener('click', () => {
            const current = html.getAttribute('data-theme');
            const next = current === 'day' ? 'night' : 'day';
            html.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
        });

        const glow = document.getElementById('glow');
        let mouseX = 0, mouseY = 0, glowX = 0, glowY = 0;
        document.addEventListener('mousemove', (e) => { mouseX = e.clientX; mouseY = e.clientY; });
        function animate() {
            glowX += (mouseX - glowX) * 0.08;
            glowY += (mouseY - glowY) * 0.08;
            glow.style.left = glowX + 'px';
            glow.style.top = glowY + 'px';
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
